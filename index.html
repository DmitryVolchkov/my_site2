  <script>
    /**
     * Куда положить JSON:
     *  - Рекомендуемо: папка /data рядом с index.html
     *      /data/scale_data.json
     *      /data/timeline_data.json
     *
     * Если вы кладёте JSON рядом с index.html, поменяйте пути ниже на:
     *   SCALE_JSON_URL = 'scale_data.json'
     *   TIMELINE_JSON_URL = 'timeline_data.json'
     */
    const SCALE_JSON_URL = 'data/scale_data.json';
    const TIMELINE_JSON_URL = 'data/timeline_data.json';

    // Фоллбэк, если JSON не найден (страница всё равно откроется)
    window.timelineConfig = {
      minYear: -2000,
      maxYear: 2025,
      groupSteps: [10, 50, 100],
      labelFrequency: 10,
      keyboardStepYears: 10,
      minYearWidth: 2,
      maxYearWidth: 30
    };

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Не удалось загрузить скрипт: ' + src));
        document.head.appendChild(s);
      });
    }

    async function loadUnifiedData() {
      const r = await fetch(SCALE_JSON_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('scale_data.json не найден по пути: ' + SCALE_JSON_URL);
      const scale = await r.json();

      // Настраиваем вашу шкалу из JSON
      window.timelineConfig = {
        minYear: Number(scale.minYear),
        maxYear: Number(scale.maxYear),
        groupSteps: [10, 50, 100],
        labelFrequency: 10,
        keyboardStepYears: 10,
        minYearWidth: 2,
        maxYearWidth: 30
      };

      // Сохраняем события на будущее (подсветка/фильтры и т.п.)
      window.__scaleData = scale;

      // Центр-тултип по умолчанию — текущий календарный год, но ограничим диапазоном шкалы
      const nowYear = new Date().getFullYear();
      const clamped = Math.min(window.timelineConfig.maxYear, Math.max(window.timelineConfig.minYear, nowYear));
      const tip = document.getElementById('timelineCenterTooltip');
      if (tip) tip.textContent = String(clamped);

      return scale;
    }

    async function initPage() {
      // 1) Загружаем unified data (если есть)
      try {
        await loadUnifiedData();
      } catch (e) {
        console.warn(e);
        // если данных нет — оставляем фоллбэк и всё равно инициализируем шкалу
        const tip = document.getElementById('timelineCenterTooltip');
        if (tip) tip.textContent = String(new Date().getFullYear());
      }

      // 2) Загружаем ваши скрипты шкалы ПОСЛЕ того, как timelineConfig готов
      await loadScript('js/timeline-header.js');
      await loadScript('js/main.js');

      // 3) Загружаем TimelineJS и инициализируем из timeline_data.json
      await loadScript('https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js');

      if (window.TL && typeof window.TL.Timeline === 'function') {
        // timeline_data.json должен быть доступен по URL (TIMELINE_JSON_URL)
        window.__timeline = new TL.Timeline('timelinejs-embed', TIMELINE_JSON_URL, {
          language: 'ru'
        });
      } else {
        console.error('TimelineJS не инициализировался: TL.Timeline не найден.');
      }
    }

    // Старт
    initPage();
  </script>
</body>
