<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Шкала времени v5 + TimelineJS (единые данные)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Ваши стили -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/timeline-header.css">

  <!-- TimelineJS3 стили (Knight Lab) -->
  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">

  <link rel="stylesheet" href="css/vertical-timeline.css">
  <style>
    timeline.content {
      display: block;
      max-width: 800px;
      margin: 40px auto 0;
      padding: 0 20px 40px;
    }
  </style>
</head>
<body>
  <!--<header class="timeline-header" role="banner">
    <div class="timeline-header-inner">
      <div class="timeline-center-marker" aria-hidden="true">
        <div class="timeline-center-tooltip" id="timelineCenterTooltip">—</div>
      </div>
      <div class="timeline-title" aria-hidden="true">Шкала времени</div>

      <nav class="timeline-nav" aria-label="Горизонтальная шкала времени (годы до и после нулевого года)">
        <div class="timeline-viewport" id="timelineViewport" tabindex="0">
          <div class="timeline-axis" id="timelineAxis" role="list"></div>
        </div>
      </nav>
    </div>
  </header>-->

  <timeline class="content">
    <div class="vtl" id="verticalTimeline">
      <!-- События вставляются из JS -->
    </div>
  </timeline>

  <!-- Блок с информацией об историческом факте -->
  <section class="fact-panel">
    <div class="fact-meta">
      <div class="fact-title">Название факта</div>
      <div class="fact-date">Дата</div>
    </div>
    <div class="fact-body">
      <p class="fact-text">Описание исторического события появится здесь.</p>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      © 2026 — Шкала времени v5 + TimelineJS (единые данные)
    </div>
  </footer>

  <script>
    const TIMELINE_JSON_URL = 'data/timeline_data.json';

    // Формат даты: { year, month?, day? } → строка
    function formatDate(d) {
      if (!d) return '';
      const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
      let s = '';
      if (d.day)   s += d.day + ' ';
      if (d.month) s += months[d.month - 1] + ' ';
      s += d.year + ' г.';
      return s.trim();
    }

    async function buildVerticalTimeline() {
      const container = document.getElementById('verticalTimeline');
      if (!container) return;

      let data;
      try {
        const r = await fetch(TIMELINE_JSON_URL, { cache: 'no-store' });
        if (!r.ok) throw new Error();
        data = await r.json();
      } catch {
        container.innerHTML = '<p style="color:#999">Не удалось загрузить данные.</p>';
        return;
      }

      const events = (data.events || []).sort((a, b) => {
        const ay = a.start_date?.year ?? 0;
        const by = b.start_date?.year ?? 0;
        return ay - by;
      });

      events.forEach((ev, i) => {
        const headline = ev.text?.headline || '';
        const text     = ev.text?.text || '';
        const date     = formatDate(ev.start_date);
        const group    = ev.group || '';
        const side     = i % 2 === 0 ? 'left' : 'right';

        const item = document.createElement('div');
        item.className = `vtl__item vtl__item--${side}`;

        item.innerHTML = `
          <div class="vtl__dot"></div>
          <div class="vtl__card">
            <div class="vtl__card-meta">
              <span class="vtl__date">${date}</span>
              ${group ? `<span class="vtl__group">${group}</span>` : ''}
            </div>
            <div class="vtl__headline">${headline}</div>
            ${text ? `<div class="vtl__text">${text}</div>` : ''}
          </div>
        `;

        // Клик по карточке — заполняет блок факта внизу
        item.addEventListener('click', () => {
          const titleEl = document.querySelector('.fact-title');
          const dateEl  = document.querySelector('.fact-date');
          const textEl  = document.querySelector('.fact-text');
          if (titleEl) titleEl.textContent = headline;
          if (dateEl)  dateEl.textContent  = date;
          if (textEl)  textEl.textContent  = text || 'Описание отсутствует.';

          document.querySelectorAll('.vtl__item').forEach(el => el.classList.remove('vtl__item--active'));
          item.classList.add('vtl__item--active');

          document.querySelector('.fact-panel')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        container.appendChild(item);
      });
    }

    buildVerticalTimeline();
  </script>
</body>
</html>
