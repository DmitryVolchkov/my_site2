<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Архив истории — хронология и документы</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Ваши стили -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/site-header.css">

  <!-- TimelineJS3 (локально) -->
  <link rel="stylesheet" href="css/vendor/timeline.css">
  <link rel="stylesheet" href="css/timeline-layout.css?v=axis-fix-3">
  <link rel="stylesheet" href="css/date-search.css">

  <style>
    /* 22px группа + 55px маркер + отступы TL (4px) + ось 39px + padding main 12px */
    main.content {
      height: calc(22px + 55px + 4px + 39px + 12px);
      max-height: calc(22px + 55px + 4px + 39px + 12px);
      padding: 6px 20px;
      margin-bottom: 0;
      overflow: hidden;
      box-sizing: border-box;
    }

    main.content #chronology {
      height: 100%;
    }

    /* Контейнер под TimelineJS — на всю высоту main.content */
    #timelinejs-embed {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    /* До загрузки timeline-layout.js — не даём timenav раздуваться до 171px */
    #timelinejs-embed .tl-timenav {
      height: 100% !important;
      max-height: 100% !important;
      overflow: hidden !important;
    }

    #timelinejs-embed .tl-storyslider {
      display: none !important;
    }

    /* Ссылка на timeline.knightlab.com (блок атрибуции TimelineJS) */
    #timelinejs-embed .tl-attribution {
      display: none !important;
    }
  </style>
</head>
<body>
  <header class="site-header" role="banner">
    <div class="site-header-inner">
      <a class="site-brand" href="/">
        <span class="site-brand-title">Архив истории</span>
      </a>

      <nav class="site-nav" aria-label="Основная навигация">
        <ul class="site-nav-list">
          <li><a href="#" aria-current="page">Главная</a></li>
          <li><a href="admin.html">Администрирование</a></li>
          <li><a href="#contacts">Контакты</a></li>
        </ul>
      </nav>

      <form class="site-search" role="search" action="#" method="get">
        <input id="site-search-input" type="search" name="q" placeholder="Поиск…" aria-label="Поиск" autocomplete="off">
        <button type="submit">Найти</button>
      </form>
    </div>
  </header>

  <main class="content">
    <section id="chronology" aria-label="Хронология событий">
      <div id="timelinejs-embed" aria-label="Интерактивный таймлайн TimelineJS"></div>
    </section>
  </main>

  <section class="date-search-panel" id="date-search" aria-label="Поиск по дате">
    <form id="date-search-form" class="date-search-form">
      <label class="date-search-label" for="date-search-input">Перейти к дате</label>
      <input class="date-search-input" type="date" id="date-search-input" name="date" required>
      <button class="date-search-submit" type="submit">Найти</button>
      <p class="date-search-status" id="date-search-status" aria-live="polite">Статус поиска</p>
    </form>
  </section>

  <section class="fact-panel" id="documents" aria-labelledby="fact-panel-heading">
    <h2 id="fact-panel-heading" class="visually-hidden">Выбранный документ</h2>
    <div class="fact-meta">
      <div class="fact-title-row">
        <div class="fact-title">Название факта</div>
        <span class="fact-hashtag" id="fact-hashtag" hidden></span>
      </div>
      <div class="fact-date">Дата</div>
    </div>
    <div class="fact-body">
      <div class="fact-summary-block" id="fact-summary-block" hidden>
        <h3 class="fact-block-label">Кратко</h3>
        <p class="fact-summary" id="fact-summary"></p>
      </div>
      <div class="fact-full is-collapsed" id="fact-full">
        <h3 class="fact-block-label">Описание</h3>
        <p class="fact-full-text" id="fact-full-text">Описание исторического события появится здесь.</p>
        <div class="fact-full-media" id="fact-full-media"></div>
        <button type="button" class="fact-full-toggle" id="fact-full-toggle" hidden>Читать полностью</button>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="contacts">
    <div class="footer-inner">
      © 2026 Архив истории — хронология и документы
    </div>
  </footer>

  <script>
    /**
     * Данные собираются из SQLite сервером, который запускается командой:
     *   python server.py
     */
    const SCALE_JSON_URL = 'data/scale_data.json';
    const TIMELINE_JSON_URL = 'data/timeline_data.json';

    // Фоллбэк, если JSON не найден (страница всё равно откроется)
    window.timelineConfig = {
      minYear: -2000,
      maxYear: 2025,
      groupSteps: [10, 50, 100],
      labelFrequency: 10,
      keyboardStepYears: 10,
      minYearWidth: 2,
      maxYearWidth: 30
    };

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Не удалось загрузить скрипт: ' + src));
        document.head.appendChild(s);
      });
    }

    async function loadUnifiedData() {
      const r = await fetch(SCALE_JSON_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('Данные шкалы не найдены по пути: ' + SCALE_JSON_URL);
      const scale = await r.json();

      // Настраиваем вашу шкалу из JSON
      window.timelineConfig = {
        minYear: Number(scale.minYear),
        maxYear: Number(scale.maxYear),
        groupSteps: [10, 50, 100],
        labelFrequency: 10,
        keyboardStepYears: 10,
        minYearWidth: 2,
        maxYearWidth: 30
      };

      // Сохраняем события на будущее (подсветка/фильтры и т.п.)
      window.__scaleData = scale;

      return scale;
    }

    async function initPage() {
      // 1) Загружаем unified data (если есть)
      try {
        await loadUnifiedData();
      } catch (e) {
        console.warn(e);
      }

      await loadScript('js/main.js');

      // Загружаем TimelineJS и инициализируем из timeline_data.json
      await loadScript('js/vendor/timeline.js');

      if (window.TL && typeof window.TL.Timeline === 'function') {
        window.__timeline = new TL.Timeline('timelinejs-embed', TIMELINE_JSON_URL, {
          language: 'ru',
          timenav_height_percentage: 100,
          timenav_height_min: 90,
          max_rows: 1,
          marker_height_min: 55,
          marker_padding: 2
        });

        await loadScript('js/timeline-layout.js?v=axis-fix-3');
        if (typeof window.bindTimelineLayout === 'function') {
          window.bindTimelineLayout(window.__timeline);
        }

        await loadScript('js/date-format.js');
        await loadScript('js/date-search.js?v=media-after-text-1');
        if (typeof window.initDateSearch === 'function') {
          window.initDateSearch(window.__timeline, TIMELINE_JSON_URL);
        }
      } else {
        console.error('TimelineJS не инициализировался: TL.Timeline не найден.');
      }
    }

    // Старт
    initPage();
  </script>
</body>
</html>
